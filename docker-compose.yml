services:

  # ─── Laravel Application (PHP-FPM) ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: marketplace-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - marketplace

  # ─── Nginx Web Server ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: marketplace-nginx
    restart: unless-stopped
    ports:
      - "8080:80"          # Main app  → http://localhost:8080
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
      - vite
    networks:
      - marketplace

  # ─── Vite Dev Server (HMR) ────────────────────────────────────────────────
  vite:
    image: node:20-alpine
    container_name: marketplace-vite
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"        # Vite HMR port (exposed for browser WS)
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - marketplace

  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: marketplace-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"        # Exposed on 5433 to avoid conflicts with your sg-verify-pg (55432)
    environment:
      POSTGRES_DB: ${DB_DATABASE:-marketplace}
      POSTGRES_USER: ${DB_USERNAME:-marketplace_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-marketplace_user} -d ${DB_DATABASE:-marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

  # ─── Redis Cache & Queue ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    restart: unless-stopped
    ports:
      - "6380:6379"        # Exposed on 6380 to avoid any local Redis conflicts
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

  # ─── Mailpit (local email testing) ───────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: marketplace-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"        # Mailpit web UI → http://localhost:8025
      - "1025:1025"        # SMTP
    networks:
      - marketplace

# ─── Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────
networks:
  marketplace:
    driver: bridge
